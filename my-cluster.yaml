apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: my-cluster
spec:
  kafka:
    replicas: 3
    listeners:
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
    config:
      ssl.client.auth: required
      ssl.truststore.location: "/opt/kafka/certificates/client-truststore.jks"
      ssl.truststore.password: "${STRIMZI_TRUSTSTORE_PASSWORD}"  # Use env var
    template:
      pod:
        volumes:
          - name: custom-truststore
            secret:
              secretName: kafka-custom-truststore
        volumeMounts:
          - name: custom-truststore
            mountPath: "/opt/kafka/certificates"
            readOnly: true
        env:
          - name: STRIMZI_TRUSTSTORE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: kafka-truststore-password
                key: truststore-password
